name: Deploy Ollama Stack

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to pull'
        required: false
        default: ''
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - acc
          - prd
          - all

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "ERROR: secrets.SSH_PRIVATE_KEY is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "ERROR: secrets.DEPLOY_HOST is not set"
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "ERROR: secrets.DEPLOY_USER is not set"
            exit 1
          fi
          echo "✅ All secrets are set"

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo '✅ SSH connection successful'"

      - name: Deploy to Dev
        if: |
          github.ref == 'refs/heads/dev' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ~/Projects/ollama-stack && git pull && bash ./scripts/deploy.sh dev"

      - name: Pull model to Dev (if specified)
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.model != '' &&
          (github.event.inputs.environment == 'dev' || github.event.inputs.environment == 'all')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo docker exec ollama-dev ollama pull ${{ github.event.inputs.model }}"

      - name: Deploy to Acc
        if: |
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'acc')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ~/Projects/ollama-stack && git pull && bash ./scripts/deploy.sh acc"

      - name: Pull model to Acc (if specified)
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.model != '' &&
          (github.event.inputs.environment == 'acc' || github.event.inputs.environment == 'all')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo docker exec ollama-acc ollama pull ${{ github.event.inputs.model }}"

      - name: Deploy to Prd
        if: |
          github.ref == 'refs/heads/main' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prd')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ~/Projects/ollama-stack && git pull && bash ./scripts/deploy.sh prd"

      - name: Pull model to Prd (if specified)
        if: |
          github.event_name == 'workflow_dispatch' && 
          github.event.inputs.model != '' &&
          (github.event.inputs.environment == 'prd' || github.event.inputs.environment == 'all')
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo docker exec ollama-prd ollama pull ${{ github.event.inputs.model }}"

      - name: Verify deployment
        run: |
          echo "=== Deployment verification ==="
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"